<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Plus - Signup</title>
    <style>
        body { background-color: #1a0b2e; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { width: 90%; max-width: 400px; text-align: center; }
        .logo { background-color: #ffcc00; color: black; width: 60px; height: 60px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin: 0 auto 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: none; background-color: #2d1b4d; color: white; box-sizing: border-box; }
        .btn { background-color: #ffb400; color: black; font-weight: bold; border: none; padding: 15px; width: 100%; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">GP</div>
        <h2>Gold Plus</h2>
        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">
        <button class="btn" onclick="location.href='dashboard.html'">Create Account</button>
    </div>
</body>
</html>
